<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Circle Painter · Smart Blocks & Levels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1e2b;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }
    .game-wrapper {
      width: 100%;
      max-width: 600px;
      background: #252a3a;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .timer-row {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f111a;
      border-radius: 30px;
      padding: 8px 20px;
      color: #fbc531;
      font-weight: bold;
      font-size: 1.4rem;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }
    .mode-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mode-btn {
      background: #3d4a59;
      border: none;
      color: white;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      transition: 0.2s;
      box-shadow: 0 3px 0 #1e272e;
    }
    .mode-btn.active {
      background: #fbc531;
      color: #1e272e;
      box-shadow: 0 3px 0 #b3931d;
    }
    .level-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .level-btn {
      background: #2c3e50;
      border: 2px solid #4a627a;
      color: #ddd;
      font-weight: bold;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .level-btn.active {
      background: #fbc531;
      color: #1e272e;
      border-color: #fbc531;
      font-weight: bold;
    }
    .grid-container {
      display: flex;
      justify-content: center;
    }
    .grid {
      display: grid;
      gap: 6px;
      background: #0f111a;
      padding: 8px;
      border-radius: 16px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
      width: fit-content;
      margin: 0 auto;
    }
    .cell {
      aspect-ratio: 1 / 1;
      width: 60px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #2c3e50;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      transition: 0.1s;
      position: relative;
    }
    .cell.drop-hover {
      outline: 3px solid #fbc531;
      outline-offset: 2px;
      filter: brightness(1.15);
    }
    .circle {
      width: 60%;
      height: 60%;
      border-radius: 50%;
      background-color: #000;
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.5);
      transition: background-color 0.1s;
    }
    .blocks-panel {
      background: #1e2330;
      border-radius: 20px;
      padding: 14px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      min-height: 70px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }
    .block {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      background-color: #e74c3c;
      box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 8px 15px rgba(0,0,0,0.4);
      transition: transform 0.1s, filter 0.1s;
      position: relative;
    }
    .block:active {
      cursor: grabbing;
      transform: scale(0.94);
      filter: brightness(1.1);
    }
    .block.dragging {
      opacity: 0.5;
      transform: scale(0.9);
    }
    .block.disabled {
      pointer-events: none;
      opacity: 0.5;
      filter: grayscale(0.6);
    }
    .arrow {
      font-size: 26px;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      line-height: 1;
      pointer-events: none;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ccc;
      font-weight: 600;
      gap: 10px;
    }
    .reset-btn {
      background: #e67e22;
      border: none;
      color: white;
      font-weight: bold;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.4px;
      box-shadow: 0 4px 0 #b85e1a, 0 6px 12px rgba(0,0,0,0.4);
      transition: 0.1s;
    }
    .reset-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b85e1a, 0 4px 8px rgba(0,0,0,0.4);
    }
    .message {
      color: #fbc531;
      font-weight: bold;
      font-size: 1.1rem;
      text-align: center;
      min-height: 22px;
    }
    @media (max-width: 480px) {
      .cell { width: 45px; }
      .block { width: 46px; height: 46px; }
      .arrow { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="timer-row">
    <span>⏳ <span id="timerDisplay">05:00</span></span>
  </div>

  <div class="mode-bar">
    <button id="randomModeBtn" class="mode-btn active">🎲 Random</button>
    <button id="levelsModeBtn" class="mode-btn">📋 Levels</button>
    <div id="levelSelector" class="level-selector" style="display:none;"></div>
  </div>

  <div class="grid-container">
    <div class="grid" id="gridContainer"></div>
  </div>
  <div class="blocks-panel" id="blocksPanel"></div>
  <div class="controls">
    <span id="infoText">🎯 Paint circles to match (unlimited blocks)</span>
    <button class="reset-btn" id="resetButton">↺ Restart</button>
  </div>
  <div class="message" id="winMessage"></div>
</div>

<script>
  (function() {
    // ----- LEVEL DEFINITIONS -----
    const levels = [
      { name: '1', rows: 4, cols: 4, colors: ['#e74c3c', '#3498db'] },
      { name: '2', rows: 4, cols: 4, colors: ['#9b59b6', '#e67e22', '#2ecc71'] },
      { name: '3', rows: 5, cols: 5, colors: ['#f1c40f', '#1abc9c'] },
      { name: '4', rows: 5, cols: 5, colors: ['#e74c3c', '#3498db', '#2ecc71'] },
      { name: '5', rows: 6, cols: 6, colors: ['#e74c3c', '#3498db', '#9b59b6', '#fd79a8'] }
    ];

    // ----- GAME CONFIG -----
    const DEFAULT_RANDOM_ROWS = 5;
    const DEFAULT_RANDOM_COLS = 5;
    const DEFAULT_RANDOM_PALETTE = ['#e74c3c', '#2ecc71', '#3498db']; // red, green, blue
    const INITIAL_BLOCK_COUNT = 8;
    const TOTAL_TIME = 300; // 5 minutes

    // ----- STATE -----
    let gameRows = DEFAULT_RANDOM_ROWS;
    let gameCols = DEFAULT_RANDOM_COLS;
    let currentPalette = [...DEFAULT_RANDOM_PALETTE];
    let gridColors = [];
    let circleColors = [];
    let blocksRemaining = [];
    let puzzleComplete = false;
    let gameLost = false;
    let isAnimating = false;
    let timeLeft = TOTAL_TIME;
    let timerInterval = null;
    let cellElements = []; // 2D array of circle DOM elements
    let currentMode = 'random'; // 'random' or 'level'
    let currentLevelIndex = 0; // active level when in 'level' mode

    // DOM elements
    const gridContainer = document.getElementById('gridContainer');
    const blocksPanel = document.getElementById('blocksPanel');
    const winMessage = document.getElementById('winMessage');
    const timerDisplay = document.getElementById('timerDisplay');
    const infoText = document.getElementById('infoText');
    const randomModeBtn = document.getElementById('randomModeBtn');
    const levelsModeBtn = document.getElementById('levelsModeBtn');
    const levelSelector = document.getElementById('levelSelector');
    const resetButton = document.getElementById('resetButton');

    // ----- TIMER -----
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = formatTime(timeLeft);
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timeLeft = TOTAL_TIME;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        if (puzzleComplete || gameLost || isAnimating) return;
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
          timeLeft = 0;
          clearInterval(timerInterval);
          loseGame();
        }
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function loseGame() {
      if (gameLost || puzzleComplete) return;
      gameLost = true;
      stopTimer();
      isAnimating = false;
      winMessage.textContent = '⏰ Time\'s up! You lost. Try again.';
      disableAllBlocks();
    }

    function disableAllBlocks() {
      document.querySelectorAll('.block').forEach(b => b.classList.add('disabled'));
    }

    function enableBlocksIfActive() {
      if (!puzzleComplete && !gameLost && !isAnimating) {
        document.querySelectorAll('.block').forEach(b => b.classList.remove('disabled'));
      }
    }

    // ----- MODE & LEVEL UI -----
    function buildLevelButtons() {
      levelSelector.innerHTML = '';
      levels.forEach((level, idx) => {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.textContent = level.name;
        btn.addEventListener('click', () => {
          setLevel(idx);
        });
        levelSelector.appendChild(btn);
      });
    }

    function setMode(mode) {
      currentMode = mode;
      if (mode === 'random') {
        randomModeBtn.classList.add('active');
        levelsModeBtn.classList.remove('active');
        levelSelector.style.display = 'none';
        gameRows = DEFAULT_RANDOM_ROWS;
        gameCols = DEFAULT_RANDOM_COLS;
        currentPalette = [...DEFAULT_RANDOM_PALETTE];
      } else {
        randomModeBtn.classList.remove('active');
        levelsModeBtn.classList.add('active');
        levelSelector.style.display = 'flex';
        // default to level 1 if not already set
        if (!levels[currentLevelIndex]) currentLevelIndex = 0;
        applyLevel(currentLevelIndex);
      }
      resetGame();
    }

    function setLevel(index) {
      currentLevelIndex = index;
      applyLevel(index);
      // highlight active level button
      document.querySelectorAll('.level-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
      resetGame();
    }

    function applyLevel(index) {
      const level = levels[index];
      gameRows = level.rows;
      gameCols = level.cols;
      currentPalette = [...level.colors];
    }

    // ----- GAME LOGIC -----
    function generateRandomGrid() {
      gridColors = [];
      circleColors = [];
      for (let r = 0; r < gameRows; r++) {
        gridColors[r] = [];
        circleColors[r] = [];
        for (let c = 0; c < gameCols; c++) {
          const color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
          gridColors[r][c] = color;
          circleColors[r][c] = '#000000';
        }
      }
    }

    // Smart block generation: ensures all currently needed colors are present
    function generateBlocks() {
      // Determine needed colors (colors where any cell doesn't match)
      const neededSet = new Set();
      for (let r = 0; r < gameRows; r++) {
        for (let c = 0; c < gameCols; c++) {
          if (circleColors[r][c] !== gridColors[r][c]) {
            neededSet.add(gridColors[r][c]);
          }
        }
      }
      const neededColors = Array.from(neededSet);
      // Fallback to current palette if nothing needed (shouldn't happen during play)
      const colorPool = neededColors.length > 0 ? neededColors : currentPalette;

      blocksRemaining = [];
      // First, guarantee each needed color appears at least once
      for (let color of neededColors) {
        const directions = ['up', 'down', 'left', 'right'];
        const direction = directions[Math.floor(Math.random() * directions.length)];
        blocksRemaining.push({ color, direction });
      }
      // Fill remaining slots with random colors from the needed pool
      while (blocksRemaining.length < INITIAL_BLOCK_COUNT) {
        const color = colorPool[Math.floor(Math.random() * colorPool.length)];
        const directions = ['up', 'down', 'left', 'right'];
        const direction = directions[Math.floor(Math.random() * directions.length)];
        blocksRemaining.push({ color, direction });
      }
      // Shuffle the array so the guaranteed ones aren't always at the beginning
      for (let i = blocksRemaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [blocksRemaining[i], blocksRemaining[j]] = [blocksRemaining[j], blocksRemaining[i]];
      }
    }

    function buildGridUI() {
      gridContainer.innerHTML = '';
      gridContainer.style.gridTemplateColumns = `repeat(${gameCols}, 1fr)`;
      cellElements = [];
      for (let r = 0; r < gameRows; r++) {
        cellElements[r] = [];
        for (let c = 0; c < gameCols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.backgroundColor = gridColors[r][c];
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.setAttribute('draggable', 'false');

          const circle = document.createElement('div');
          circle.className = 'circle';
          circle.style.backgroundColor = circleColors[r][c];
          cell.appendChild(circle);
          cellElements[r][c] = circle;

          cell.addEventListener('dragover', handleDragOver);
          cell.addEventListener('dragenter', handleDragEnter);
          cell.addEventListener('dragleave', handleDragLeave);
          cell.addEventListener('drop', handleDrop);

          gridContainer.appendChild(cell);
        }
      }
    }

    function buildBlocksUI() {
      blocksPanel.innerHTML = '';
      blocksRemaining.forEach((block, index) => {
        const blockDiv = document.createElement('div');
        blockDiv.className = 'block';
        if (gameLost || puzzleComplete || isAnimating) blockDiv.classList.add('disabled');
        blockDiv.style.backgroundColor = block.color;
        blockDiv.dataset.color = block.color;
        blockDiv.dataset.direction = block.direction;
        blockDiv.dataset.index = index;
        blockDiv.setAttribute('draggable', 'true');

        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'arrow';
        const arrowSymbols = { up: '↑', down: '↓', left: '←', right: '→' };
        arrowSpan.textContent = arrowSymbols[block.direction] || '?';
        blockDiv.appendChild(arrowSpan);

        blockDiv.addEventListener('dragstart', handleDragStart);
        blockDiv.addEventListener('dragend', handleDragEnd);

        blocksPanel.appendChild(blockDiv);
      });
    }

    function refreshUI() {
      // Sync circle colors
      for (let r = 0; r < gameRows; r++) {
        for (let c = 0; c < gameCols; c++) {
          if (cellElements[r] && cellElements[r][c]) {
            cellElements[r][c].style.backgroundColor = circleColors[r][c];
          }
        }
      }
      buildBlocksUI();
      checkWinCondition();
    }

    function checkWinCondition() {
      if (puzzleComplete || gameLost) return;
      let allMatch = true;
      for (let r = 0; r < gameRows; r++) {
        for (let c = 0; c < gameCols; c++) {
          if (circleColors[r][c] !== gridColors[r][c]) {
            allMatch = false;
            break;
          }
        }
        if (!allMatch) break;
      }
      if (allMatch) {
        puzzleComplete = true;
        stopTimer();
        winMessage.textContent = '✨ Perfect! All circles match! ✨';
        disableAllBlocks();
      }
    }

    function getPaintSequence(startRow, startCol, direction) {
      const sequence = [{ r: startRow, c: startCol }];
      let dr = 0, dc = 0;
      switch (direction) {
        case 'up': dr = -1; break;
        case 'down': dr = 1; break;
        case 'left': dc = -1; break;
        case 'right': dc = 1; break;
      }
      let r = startRow + dr;
      let c = startCol + dc;
      while (r >= 0 && r < gameRows && c >= 0 && c < gameCols) {
        sequence.push({ r, c });
        r += dr;
        c += dc;
      }
      return sequence;
    }

    function animatePaint(sequence, color, callback) {
      if (sequence.length === 0) {
        callback();
        return;
      }
      let index = 0;
      isAnimating = true;
      disableAllBlocks();

      function paintNext() {
        if (gameLost || puzzleComplete) {
          isAnimating = false;
          enableBlocksIfActive();
          return;
        }
        if (index >= sequence.length) {
          isAnimating = false;
          enableBlocksIfActive();
          callback();
          return;
        }
        const { r, c } = sequence[index];
        circleColors[r][c] = color;
        if (cellElements[r] && cellElements[r][c]) {
          cellElements[r][c].style.backgroundColor = color;
        }
        index++;
        setTimeout(paintNext, 100);
      }

      paintNext();
    }

    // ----- DRAG & DROP -----
    function handleDragStart(e) {
      if (puzzleComplete || gameLost || isAnimating) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({
        color: this.dataset.color,
        direction: this.dataset.direction,
        index: this.dataset.index
      }));
      e.dataTransfer.effectAllowed = 'move';
      this.classList.add('dragging');
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e) {
      e.preventDefault();
      this.classList.add('drop-hover');
    }

    function handleDragLeave(e) {
      this.classList.remove('drop-hover');
    }

    function handleDrop(e) {
      e.preventDefault();
      this.classList.remove('drop-hover');
      if (puzzleComplete || gameLost || isAnimating) return;

      const cell = this;
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let blockData;
      try {
        blockData = JSON.parse(rawData);
      } catch (err) {
        return;
      }
      const { color, direction, index } = blockData;
      const blockIdx = parseInt(index);
      if (isNaN(blockIdx) || blockIdx >= blocksRemaining.length) return;
      const block = blocksRemaining[blockIdx];
      if (block.color !== color || block.direction !== direction) return;

      const sequence = getPaintSequence(row, col, direction);
      
      animatePaint(sequence, color, () => {
        // Remove used block
        blocksRemaining.splice(blockIdx, 1);
        // Refill if empty and game still active
        if (blocksRemaining.length === 0 && !puzzleComplete && !gameLost) {
          generateBlocks(); // smart generation based on current needs
        }
        refreshUI();
      });
    }

    // ----- RESET -----
    function resetGame() {
      stopTimer();
      puzzleComplete = false;
      gameLost = false;
      isAnimating = false;
      winMessage.textContent = '';
      generateRandomGrid();
      generateBlocks(); // uses current circleColors (all black) -> needed = all colors in grid
      buildGridUI();
      buildBlocksUI();
      enableBlocksIfActive();
      startTimer();
    }

    // ----- INITIAL SETUP & EVENT LISTENERS -----
    function init() {
      buildLevelButtons();
      // default random mode active
      setMode('random');

      randomModeBtn.addEventListener('click', () => setMode('random'));
      levelsModeBtn.addEventListener('click', () => setMode('level'));
      resetButton.addEventListener('click', resetGame);

      document.body.addEventListener('dragover', (e) => e.preventDefault());
      document.body.addEventListener('drop', (e) => e.preventDefault());
    }

    init();
  })();
</script>
</body>
</html>
